# ghostty-tmux-integration.conf
# Tmux side of the Ghostty+tmux keyboard integration.
#
# This file works in concert with:
#   - ~/.hammerspoon/ghostty-tmux-integration.lua  (intercepts macOS hotkeys)
#
# How it works:
#   When a tmux client gains focus, call the Hammerspoon CLI to register this
#   window as having an active tmux client. Hammerspoon uses this registry to
#   decide whether to intercept hotkeys or pass them through to Ghostty.
#   When a tmux client exits or detaches, the client-detached hook clears it.
#   When a Ghostty window loses focus, Hammerspoon also clears it from the registry.
#
# Install:
#   Add to ~/.tmux.conf:
#     source ~/.config/tmux/ghostty-tmux-integration.conf

# Required for focus events to fire on window switch.
set -g focus-events on

# On focus, register this client with Hammerspoon.
set-hook -g client-focus-in "run-shell 'hs -c \"require(\\\"ghostty-tmux-integration\\\").registerFocus(\\\"#{client_tty}\\\", \\\"#{session_name}\\\")\"'"

# On session switch (e.g. choose-session), re-register with the new session name.
set-hook -g client-session-changed "run-shell 'hs -c \"require(\\\"ghostty-tmux-integration\\\").registerFocus(\\\"#{client_tty}\\\", \\\"#{session_name}\\\")\"'"

# On session rename, re-register so the registry doesn't hold a stale name.
set-hook -g session-renamed "run-shell 'hs -c \"require(\\\"ghostty-tmux-integration\\\").registerFocus(\\\"#{client_tty}\\\", \\\"#{session_name}\\\")\"'"

# On detach/exit, unregister so macOS hotkeys (e.g. cmd+w) pass through again.
set-hook -g client-detached "run-shell 'hs -c \"require(\\\"ghostty-tmux-integration\\\").unregisterFocus(\\\"#{client_tty}\\\")\"'"

# Reflect the tmux session name into the macOS window title.
set -g set-titles on
set -g set-titles-string "#{session_name}"
